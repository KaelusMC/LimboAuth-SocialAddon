name: Java CI with Gradle

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      - name: Set up JDK
        uses: actions/setup-java@v4.7.0
        with:
          distribution: adopt
          java-version: 17
      - name: Prepare truststore for Elytrium Maven
        run: |
          set -euo pipefail
          TRUSTSTORE="$RUNNER_TEMP/cacerts"
          cp "$JAVA_HOME/lib/security/cacerts" "$TRUSTSTORE"

          openssl s_client -showcerts -servername maven.elytrium.net -connect maven.elytrium.net:443 </dev/null 2>/dev/null \
            | awk '/-----BEGIN CERTIFICATE-----/ {c++; in_cert=1} in_cert {print > ("cert-" c ".crt")} /-----END CERTIFICATE-----/ {in_cert=0}'

          ls cert-*.crt >/dev/null 2>&1

          for cert in cert-*.crt; do
            keytool -importcert -noprompt -trustcacerts \
              -alias "elytrium-${cert}" \
              -file "$cert" \
              -keystore "$TRUSTSTORE" \
              -storepass changeit
          done

          echo "GRADLE_OPTS=-Djavax.net.ssl.trustStore=$TRUSTSTORE -Djavax.net.ssl.trustStorePassword=changeit" >> "$GITHUB_ENV"
      - name: Build LimboAuth Social Addon
        run: ./gradlew build
      - name: Upload LimboAuth Social Addon
        uses: actions/upload-artifact@v4.6.2
        with:
          name: LimboAuth Social Addon
          path: "build/libs/LimboAuth*.jar"
      - uses: dev-drprasad/delete-tag-and-release@v0.2.1
        if: ${{ github.event_name == 'push' }}
        with:
          delete_release: true
          tag_name: dev-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Find git version
        id: git-version
        run: echo "id=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Find correct JAR
        if: ${{ github.event_name == 'push' }}
        id: find-jar
        run: |
          output="$(find build/libs/ ! -name "*-javadoc.jar" ! -name "*-sources.jar" -type f -printf "%f\n")"
          echo "::set-output name=jarname::$output"
      - name: Release the build
        if: ${{ github.event_name == 'push' }}
        uses: ncipollo/release-action@v1
        with:
          artifacts: build/libs/${{ steps.find-jar.outputs.jarname }}
          body: ${{ join(github.event.commits.*.message, '\n') }}
          prerelease: true
          name: Dev-build ${{ steps.git-version.outputs.id }}
          tag: dev-build
      - name: Upload to Modrinth
        if: ${{ github.event_name == 'push' }}
        uses: RubixDev/modrinth-upload@v1.0.0
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          file_path: build/libs/${{ steps.find-jar.outputs.jarname }}
          name: Dev-build ${{ steps.git-version.outputs.id }}
          version: ${{ steps.git-version.outputs.id }}
          changelog: ${{ join(github.event.commits.*.message, '\n') }}
          relations: 4iChqdl8:required
          game_versions: 1.7.2
          release_type: beta
          loaders: velocity
          featured: false
          project_id: fPyQl4rd
